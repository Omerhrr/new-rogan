services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/rogan-live.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - NODE_ENV=production
      - NEXT_PUBLIC_WS_URL=http://localhost:3001
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ws:
    build:
      context: ./mini-services/rogan-live-ws
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
      # WebRTC media ports (MediaSoup RTC range)
      - "10000-10100:10000-10100/udp"
    environment:
      - PORT=3001
      - CORS_ORIGIN=http://localhost:3000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ANNOUNCED_IP=${ANNOUNCED_IP:-127.0.0.1}
    restart: unless-stopped

volumes:
  db-data:
